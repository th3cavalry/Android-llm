name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: SovereignDroid
  JAVA_VERSION: 21

jobs:
  validate:
    name: "Step 1: Validate"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Static Analysis (Detekt)
        run: ./gradlew detekt

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest

  build-and-release:
    name: "Step 2: Build & Release"
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # The KEYSTORE_PATH will be handled by the signing step below or we can use a temporary file

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get Version Name
        id: get_version
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -n 1 | awk -F'"' '{print $2}')
          echo "version=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} "app/build/outputs/apk/release/${{ env.APP_NAME }}-v${VERSION}.apk"
          echo "SIGNED_APK=app/build/outputs/apk/release/${{ env.APP_NAME }}-v${VERSION}.apk" >> $GITHUB_ENV

      - name: Generate Checksum
        run: |
          sha256sum "${{ env.SIGNED_APK }}" > "${{ env.SIGNED_APK }}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SovereignDroid v${{ steps.get_version.outputs.version }}"
          prerelease: ${{ contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'alpha') }}
          generate_release_notes: true
          files: |
            ${{ env.SIGNED_APK }}
            ${{ env.SIGNED_APK }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
